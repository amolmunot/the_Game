kind = "web"
previewPath = "/"
title = "Retro Webcam Boxing"
version = "1.0.0"
id = "artifacts/boxing-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24201

[services.development]
run = "pnpm --filter @workspace/boxing-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boxing-game", "run", "build" ]
publicDir = "artifacts/boxing-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24201"
BASE_PATH = "/"
